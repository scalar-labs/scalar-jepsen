name: Daily ScalarDB Cluster test

on:
  schedule:
    - cron: "0 10 * * *"

jobs:
  daily-cluster:
    name: "Daily ScalarDB Cluster test"

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        tests:
          - name: "Transfers_SI"
            backend_db: "postgres"
            workload: "transfer transfer-append"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "snapshot"
            jdbc_isolation_level: "read-committed"
            consistency_model: "snapshot-isolation"
            time_limit: 600
          - name: "Transfers_2PC_SI"
            backend_db: "postgres"
            workload: "transfer-2pc transfer-append-2pc"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "snapshot"
            jdbc_isolation_level: "read-committed"
            consistency_model: "snapshot-isolation"
            time_limit: 600
          - name: "ReadCommitted"
            backend_db: "postgres"
            workload: "elle-append elle-write-read"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "read-committed"
            jdbc_isolation_level: "read-committed"
            consistency_model: "cursor-stability"
            time_limit: 600
          - name: "ReadCommitted_2PC"
            backend_db: "postgres"
            workload: "elle-append-2pc elle-write-read-2pc"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "read-committed"
            jdbc_isolation_level: "read-committed"
            consistency_model: "cursor-stability"
            time_limit: 600
          - name: "RCSI"
            backend_db: "postgres"
            workload: "elle-append elle-write-read"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "snapshot"
            jdbc_isolation_level: "read-committed"
            consistency_model: "cursor-stability"
            time_limit: 600
          - name: "RCSI_2PC"
            backend_db: "postgres"
            workload: "elle-append-2pc elle-write-read-2pc"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "snapshot"
            jdbc_isolation_level: "read-committed"
            consistency_model: "cursor-stability"
            time_limit: 600
          - name: "Serializable"
            backend_db: "postgres"
            workload: "elle-append elle-write-read"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "serializable"
            jdbc_isolation_level: "read-committed"
            consistency_model: "strict-serializable"
            time_limit: 600
          - name: "Serializable_2PC"
            backend_db: "postgres"
            workload: "elle-append-2pc elle-write-read-2pc"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "serializable"
            jdbc_isolation_level: "read-committed"
            consistency_model: "strict-serializable"
            time_limit: 600
          - name: "OnePhaseCommit_SI"
            backend_db: "postgres"
            workload: "elle-append elle-write-read"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: true
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "snapshot"
            jdbc_isolation_level: "read-committed"
            consistency_model: "cursor-stability"
            time_limit: 600
          - name: "OnePhaseCommit_Serializable"
            backend_db: "postgres"
            workload: "elle-append elle-write-read"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: true
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "serializable"
            jdbc_isolation_level: "read-committed"
            consistency_model: "strict-serializable"
            time_limit: 600
          - name: "GroupCommit"
            backend_db: "postgres"
            workload: "elle-append elle-write-read"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: true
            enable_client_side_optimizations: false
            isolation_level: "serializable"
            jdbc_isolation_level: "read-committed"
            consistency_model: "strict-serializable"
            time_limit: 600
          - name: "ClientSideOptimizations"
            backend_db: "postgres"
            workload: "elle-append elle-write-read"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: true
            isolation_level: "snapshot"
            jdbc_isolation_level: "read-committed"
            consistency_model: "cursor-stability"
            time_limit: 600
          - name: "AlloyDB"
            backend_db: "alloydb"
            workload: "transfer transfer-append elle-append elle-write-read"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "snapshot"
            jdbc_isolation_level: "read-committed"
            consistency_model: "cursor-stability"
            time_limit: 600
          - name: "MySQL"
            backend_db: "mysql"
            workload: "transfer transfer-append elle-append elle-write-read"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "snapshot"
            jdbc_isolation_level: "read-committed"
            consistency_model: "cursor-stability"
            time_limit: 600
          - name: "MariaDB"
            backend_db: "mariadb"
            workload: "transfer transfer-append elle-append elle-write-read"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "snapshot"
            jdbc_isolation_level: "read-committed"
            consistency_model: "cursor-stability"
            time_limit: 600
          - name: "TiDB"
            backend_db: "tidb"
            workload: "transfer transfer-append elle-append elle-write-read"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "snapshot"
            jdbc_isolation_level: "read-committed"
            consistency_model: "cursor-stability"
            time_limit: 600
          - name: "SQLServer"
            backend_db: "sqlserver"
            workload: "transfer transfer-append elle-append elle-write-read"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "snapshot"
            jdbc_isolation_level: "read-committed"
            consistency_model: "cursor-stability"
            time_limit: 600
          - name: "Oracle"
            backend_db: "oracle"
            workload: "transfer transfer-append elle-append elle-write-read"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "snapshot"
            jdbc_isolation_level: "read-committed"
            consistency_model: "cursor-stability"
            time_limit: 600


    steps:
    - uses: actions/checkout@v4

    # Need ssh to the localhost and graphviz
    - name: Install packages
      run: |
        sudo apt update
        sudo apt install -y openssh-server graphviz

    - name: Enable ssh for runner user
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        ssh-keygen -t rsa -b 2048 -f ~/.ssh/id_rsa -N ""
        cat ~/.ssh/id_rsa.pub >> ~/.ssh/authorized_keys
        chmod 600 ~/.ssh/authorized_keys
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
        sudo sed -i 's/#PubkeyAuthentication yes/PubkeyAuthentication yes/' /etc/ssh/sshd_config
        sudo service ssh restart

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Install leiningen
      uses: DeLaGuardo/setup-clojure@13.0
      with:
        lein: latest

    - name: Cache m2 repository
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/project.clj') }}
        restore-keys: |
          ${{ runner.os }}-m2-

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Set up Kind cluster
      uses: helm/kind-action@v1.12.0
      with:
        cluster_name: test-cluster

    - name: Install MetalLB
      run: |
        kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.9/config/manifests/metallb-native.yaml
        kubectl wait --namespace metallb-system \
          --for=condition=Ready pods \
          --selector=app=metallb \
          --timeout=90s

        NET=$(docker network inspect kind | jq -r '.[0].IPAM.Config[] | select(.Subnet | test("^fc00") | not) | .Subnet')
        echo "IPv4 Subnet: $NET"

        PREFIX=$(echo "$NET" | cut -d. -f1-2)
        IP_RANGE="${PREFIX}.255.200-${PREFIX}.255.250"

        cat <<EOF | kubectl apply -f -
        apiVersion: metallb.io/v1beta1
        kind: IPAddressPool
        metadata:
          name: kind-pool
          namespace: metallb-system
        spec:
          addresses:
            - $IP_RANGE
        ---
        apiVersion: metallb.io/v1beta1
        kind: L2Advertisement
        metadata:
          name: l2adv
          namespace: metallb-system
        EOF

    - name: ${{ matrix.tests.name }}
      run: |
        cd scalardb
        OPTS=""
        for w in ${{ matrix.tests.workload }}; do
          OPTS+=" --workload ${w}"
        done
        for n in ${{ matrix.tests.nemesis }}; do
          OPTS+=" --nemesis ${n}"
        done
        OPTS+=" --isolation-level ${{ matrix.tests.isolation_level }}"
        OPTS+=" --jdbc-isolation-level ${{ matrix.tests.jdbc_isolation_level }}"
        OPTS+=" --consistency-model ${{ matrix.tests.consistency_model }}"
        if [ "${{ matrix.tests.enable_one_phase_commit }}" = "true" ]; then
          OPTS+=" --enable-one-phase-commit"
        fi
        if [ "${{ matrix.tests.enable_group_commit }}" = "true" ]; then
          OPTS+=" --enable-group-commit"
        fi
        if [ "${{ matrix.tests.enable_client_side_optimizations }}" = "true" ]; then
          OPTS+=" --enable-cluster-client-side-optimizations"
        fi
        DOCKER_USERNAME=${{ github.repository_owner }} \
        DOCKER_ACCESS_TOKEN=${{ secrets.CR_PAT }} \
        lein with-profile cluster run test \
          --time-limit ${{ matrix.tests.time_limit }} \
          --nodes localhost \
          --db ${{ matrix.tests.backend_db }} \
          --concurrency 5 \
          --username runner \
          --ssh-private-key ~/.ssh/id_rsa \
          ${OPTS} > /dev/null 2>&1

    - name: Record result
      if: always()
      run: |
        if grep -q "Everything looks good!" scalardb/store/latest/jepsen.log; then
          echo "${{ matrix.tests.name }}:success" > result-${{ matrix.tests.name }}.txt
        else
          echo "${{ matrix.tests.name }}:failure" > result-${{ matrix.tests.name }}.txt
        fi

    - name: Upload result
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: result-${{ matrix.tests.name }}
        path: result-${{ matrix.tests.name }}.txt

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs-${{ matrix.tests.name }}
        path: scalardb/store

  notify-slack:
    name: Notify Slack
    if: always()
    needs: daily-cluster
    runs-on: ubuntu-latest
    steps:
      - name: Install GitHub CLI
        run: sudo apt-get install -y gh

      - name: Download result artifacts only
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p results
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --jq '.artifacts[] | select(.name | startswith("result-")) | .name' | \
            while read name; do
              echo "Downloading $name"
              gh run download ${{ github.run_id }} -n "$name" -D results -R "${{ github.repository }}"
            done

      - name: Generate Slack message
        id: message
        run: |
          successes=""
          failures=""

          for file in results/result-*.txt; do
            while read -r line; do
              name=$(echo "$line" | cut -d: -f1)
              status=$(echo "$line" | cut -d: -f2)

              if [ "$status" = "success" ]; then
                successes="${successes}- $name\n"
              else
                failures="${failures}- $name\n"
              fi
            done < "$file"
          done

          if [ -n "$failures" ]; then
            icon=":fire:"
          else
            icon=":white_check_mark:"
          fi

          {
            echo "message<<EOF"
            printf "${icon} *ScalarDB Cluster tests completed*\n\n"
            printf "*Success:*\n%s\n" "$successes"
            printf "*Failed:*\n%s\n" "$failures"
            printf "<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>\n"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Post to Slack
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\": \"${{ steps.message.outputs.message }}\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
