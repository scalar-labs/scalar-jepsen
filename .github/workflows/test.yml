name: Test with Docker

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  cassandra:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Cache
      uses: satackey/action-docker-layer-caching@v0.0.11
      # Ignore the failure of a step and avoid terminating the job.
      continue-on-error: true

    - name: docker-compose up
      run: |
        cd docker
        docker compose up -d

    - name: Cassandra test
      run: |
        docker exec jepsen-control bash -c "cd /scalar-jepsen/cassandra && lein run test --workload lwt --nodes n1,n2,n3 --ssh-private-key ~/.ssh/id_rsa"

  scalardb:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Cache
      uses: satackey/action-docker-layer-caching@v0.0.11
      # Ignore the failure of a step and avoid terminating the job.
      continue-on-error: true

    - name: docker-compose up
      run: |
        cd docker
        docker compose up -d

    - name: ScalarDB test
      run: |
        docker exec jepsen-control bash -c "cd /scalar-jepsen/cassandra && lein install"
        docker exec jepsen-control bash -c "cd /scalar-jepsen/scalardb && lein with-profile cassandra run test --workload transfer --nodes n1,n2,n3 --ssh-private-key ~/.ssh/id_rsa"

  scalardl:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout scalar-jepsen
      uses: actions/checkout@v6

    - name: Checkout ScalarDL
      uses: actions/checkout@v6
      with:
        repository: scalar-labs/scalardl
        path: scalardl-build

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('scalardl-build/**/*.gradle*', 'scalardl-build/**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build ScalarDL
      run: |
        cd scalardl-build
        ./gradlew distTar
        # Copy the built tarball to the expected location
        cp ledger/build/distributions/ledger.tar $GITHUB_WORKSPACE/scalardl/resources/ledger.tar

    - name: Setup Cache
      uses: satackey/action-docker-layer-caching@v0.0.11
      # Ignore the failure of a step and avoid terminating the job.
      continue-on-error: true

    - name: docker-compose up
      run: |
        cd docker
        docker compose up -d

    - name: ScalarDL test
      run: |
        docker exec jepsen-control bash -c "cd /scalar-jepsen/cassandra && lein install"
        docker exec jepsen-control bash -c "cd /scalar-jepsen/scalardl && lein run test --workload transfer --ssh-private-key ~/.ssh/id_rsa"

  cluster:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    # Need ssh to the localhost
    - name: Install SSH server
      run: |
        sudo apt update
        sudo apt install -y openssh-server

    - name: Enable ssh for runner user
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        ssh-keygen -t rsa -b 2048 -f ~/.ssh/id_rsa -N ""
        cat ~/.ssh/id_rsa.pub >> ~/.ssh/authorized_keys
        chmod 600 ~/.ssh/authorized_keys
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
        sudo sed -i 's/#PubkeyAuthentication yes/PubkeyAuthentication yes/' /etc/ssh/sshd_config
        sudo service ssh restart

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Install leiningen
      uses: DeLaGuardo/setup-clojure@13
      with:
        lein: latest

    - name: Cache m2 repository
      uses: actions/cache@v5
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/project.clj') }}
        restore-keys: |
          ${{ runner.os }}-m2-

    - name: Set up Kind cluster
      uses: helm/kind-action@v1.12.0
      with:
        cluster_name: test-cluster

    - name: Install MetalLB
      run: |
        kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.9/config/manifests/metallb-native.yaml
        kubectl wait --namespace metallb-system \
          --for=condition=Ready pods \
          --selector=app=metallb \
          --timeout=90s

        NET=$(docker network inspect kind | jq -r '.[0].IPAM.Config[] | select(.Subnet | test("^fc00") | not) | .Subnet')
        echo "IPv4 Subnet: $NET"

        PREFIX=$(echo "$NET" | cut -d. -f1-2)
        IP_RANGE="${PREFIX}.255.200-${PREFIX}.255.250"

        cat <<EOF | kubectl apply -f -
        apiVersion: metallb.io/v1beta1
        kind: IPAddressPool
        metadata:
          name: kind-pool
          namespace: metallb-system
        spec:
          addresses:
            - $IP_RANGE
        ---
        apiVersion: metallb.io/v1beta1
        kind: L2Advertisement
        metadata:
          name: l2adv
          namespace: metallb-system
        EOF

    - name: ScalarDB Cluster test
      env:
        DOCKER_USERNAME: ${{ github.repository_owner }}
        DOCKER_ACCESS_TOKEN: ${{ secrets.CR_PAT }}
      run: |
        cd scalardb
        lein with-profile cluster run test \
          --workload transfer \
          --db postgres \
          --nemesis crash

    - name: Check test result
      run: |
        if grep -q "Everything looks good!" scalardb/store/latest/jepsen.log; then
          echo "Test passed"
        else
          echo "Test failed"
          exit 1
        fi

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: jepsen-logs
        path: scalardb/store
