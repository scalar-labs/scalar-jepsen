    steps:
    - uses: actions/checkout@v6

    # Need ssh to the localhost and graphviz
    - name: Install packages
      run: |
        sudo apt update
        sudo apt install -y openssh-server graphviz

    - name: Enable ssh for runner user
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        ssh-keygen -t rsa -b 2048 -f ~/.ssh/id_rsa -N ""
        cat ~/.ssh/id_rsa.pub >> ~/.ssh/authorized_keys
        chmod 600 ~/.ssh/authorized_keys
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
        sudo sed -i 's/#PubkeyAuthentication yes/PubkeyAuthentication yes/' /etc/ssh/sshd_config
        sudo service ssh restart

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Install leiningen
      uses: DeLaGuardo/setup-clojure@13.5.3
      with:
        lein: latest

    - name: Cache m2 repository
      uses: actions/cache@v5
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/project.clj') }}
        restore-keys: |
          ${{ runner.os }}-m2-

    - name: Set up Docker
      uses: docker/setup-buildx-action@v4

    - name: Set up Kind cluster
      uses: helm/kind-action@v1.14.0
      with:
        cluster_name: test-cluster

    - name: Install MetalLB
      run: |
        kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.9/config/manifests/metallb-native.yaml
        kubectl wait --namespace metallb-system \
          --for=condition=Ready pods \
          --selector=app=metallb \
          --timeout=90s

        NET=$(docker network inspect kind | jq -r '.[0].IPAM.Config[] | select(.Subnet | test("^fc00") | not) | .Subnet')
        echo "IPv4 Subnet: $NET"

        PREFIX=$(echo "$NET" | cut -d. -f1-2)
        IP_RANGE="${PREFIX}.255.200-${PREFIX}.255.250"

        cat <<EOF | kubectl apply -f -
        apiVersion: metallb.io/v1beta1
        kind: IPAddressPool
        metadata:
          name: kind-pool
          namespace: metallb-system
        spec:
          addresses:
            - $IP_RANGE
        ---
        apiVersion: metallb.io/v1beta1
        kind: L2Advertisement
        metadata:
          name: l2adv
          namespace: metallb-system
        EOF

    - name: ${{ matrix.tests.name }}
      id: run-test
      timeout-minutes: 180
      run: |
        cd scalardb
        OPTS=""
        for w in ${{ matrix.tests.workload }}; do
          OPTS+=" --workload ${w}"
        done
        for n in ${{ matrix.tests.nemesis }}; do
          OPTS+=" --nemesis ${n}"
        done
        OPTS+=" --isolation-level ${{ matrix.tests.isolation_level }}"
        OPTS+=" --jdbc-isolation-level ${{ matrix.tests.jdbc_isolation_level }}"
        OPTS+=" --consistency-model ${{ matrix.tests.consistency_model }}"
        if [ "${{ matrix.tests.enable_one_phase_commit }}" = "true" ]; then
          OPTS+=" --enable-one-phase-commit"
        fi
        if [ "${{ matrix.tests.enable_group_commit }}" = "true" ]; then
          OPTS+=" --enable-group-commit"
        fi
        if [ "${{ matrix.tests.enable_client_side_optimizations }}" = "true" ]; then
          OPTS+=" --enable-cluster-client-side-optimizations"
        fi
        set +e
        DOCKER_USERNAME=${{ github.repository_owner }} \
        DOCKER_ACCESS_TOKEN=${{ secrets.CR_PAT }} \
        lein with-profile cluster run test \
          --time-limit ${{ matrix.tests.time_limit }} \
          --nodes localhost \
          --db ${{ matrix.tests.backend_db }} \
          --concurrency 5 \
          --username runner \
          --ssh-private-key ~/.ssh/id_rsa \
          ${OPTS} > /dev/null 2>&1
        EXIT_CODE=$?
        echo "done=true" >> $GITHUB_OUTPUT
        exit $EXIT_CODE

    - name: Record result
      if: always()
      run: |
        if [ "${{ steps.run-test.outputs.done }}" != "true" ]; then
          echo "${{ matrix.tests.name }}:timeout" > result-${{ matrix.tests.name }}.txt
        elif [ "${{ steps.run-test.outcome }}" = "success" ]; then
          echo "${{ matrix.tests.name }}:success" > result-${{ matrix.tests.name }}.txt
        else
          echo "${{ matrix.tests.name }}:failure" > result-${{ matrix.tests.name }}.txt
        fi

    - name: Upload result
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: result-${{ matrix.tests.name }}
        path: result-${{ matrix.tests.name }}.txt

    - name: First-pass triage with GitHub Models
      if: failure()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        LOG=scalardb/store/current/jepsen.log
        if [ ! -f "$LOG" ]; then
          echo "No jepsen.log found at $LOG; skipping triage"
          exit 0
        fi
        mkdir -p triage-${{ matrix.tests.name }}
        python3 .github/scripts/triage.py \
          --log "$LOG" \
          --summary triage-${{ matrix.tests.name }}/triage.md

    - name: Append triage summary
      if: failure()
      run: |
        if [ -f triage-${{ matrix.tests.name }}/triage.md ]; then
          cat triage-${{ matrix.tests.name }}/triage.md >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload triage
      if: failure()
      uses: actions/upload-artifact@v6
      with:
        name: triage-${{ matrix.tests.name }}
        path: triage-${{ matrix.tests.name }}/triage.md

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: logs-${{ matrix.tests.name }}
        path: scalardb/store

  notify-slack:
    name: Notify Slack
    if: always()
    needs: daily-cluster
    runs-on: ubuntu-latest
    steps:
      - name: Install GitHub CLI
        run: sudo apt-get install -y gh

      - name: Download result artifacts only
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p results
          gh api --paginate repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --jq '.artifacts[] | select(.name | startswith("result-")) | .name' | \
            while read name; do
              echo "Downloading $name"
              gh run download ${{ github.run_id }} -n "$name" -D results -R "${{ github.repository }}"
            done

      - name: Generate Slack message
        id: message
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Get expected test names from the matrix jobs in this run
          mapfile -t expected_tests < <(
            gh api --paginate "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
              --jq '.jobs[] | select(.name | startswith("ScalarDB Cluster / ")) | .name | ltrimstr("ScalarDB Cluster / ")'
          )

          successes=""
          failures=""
          timeouts=""

          # Track which tests have results
          declare -A found_tests

          for file in results/result-*.txt; do
            [ -f "$file" ] || continue
            while read -r line; do
              name=$(echo "$line" | cut -d: -f1)
              status=$(echo "$line" | cut -d: -f2)
              found_tests["$name"]=1

              if [ "$status" = "success" ]; then
                successes="${successes}- $name\n"
              elif [ "$status" = "timeout" ]; then
                timeouts="${timeouts}- $name\n"
              else
                failures="${failures}- $name\n"
              fi
            done < "$file"
          done

          # Detect missing results (likely timed out at job level)
          for test in "${expected_tests[@]}"; do
            if [ -z "${found_tests[$test]}" ]; then
              timeouts="${timeouts}- $test (no result)\n"
            fi
          done

          if [ -n "$failures" ] || [ -n "$timeouts" ]; then
            icon=":fire:"
          else
            icon=":white_check_mark:"
          fi

          {
            echo "message<<EOF"
            printf "${icon} *ScalarDB Cluster tests completed*\n\n"
            printf "*Success:*\n%s\n" "$successes"
            printf "*Failed:*\n%s\n" "$failures"
            printf "*Timed out:*\n%s\n" "$timeouts"
            printf "<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>\n"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Post to Slack
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\": \"${{ steps.message.outputs.message }}\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
