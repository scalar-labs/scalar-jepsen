name: Daily ScalarDB Cluster test

on:
  schedule:
    - cron: "0 10 * * *"

jobs:
  daily-cluster:
    name: "ScalarDB Cluster / ${{ matrix.tests.name }}"

    runs-on: ubuntu-latest

    permissions:
      contents: read
      models: read

    strategy:
      fail-fast: false
      matrix:
        tests:
          - name: "Transfers_SI"
            backend_db: "postgres"
            workload: "transfer transfer-append"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "snapshot"
            jdbc_isolation_level: "read-committed"
            consistency_model: "snapshot-isolation"
            time_limit: 600
          - name: "Transfers_2PC_SI"
            backend_db: "postgres"
            workload: "transfer-2pc transfer-append-2pc"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "snapshot"
            jdbc_isolation_level: "read-committed"
            consistency_model: "snapshot-isolation"
            time_limit: 600
          - name: "ReadCommitted"
            backend_db: "postgres"
            workload: "elle-append elle-write-read"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "read-committed"
            jdbc_isolation_level: "read-committed"
            consistency_model: "cursor-stability"
            time_limit: 600
          - name: "ReadCommitted_2PC"
            backend_db: "postgres"
            workload: "elle-append-2pc elle-write-read-2pc"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "read-committed"
            jdbc_isolation_level: "read-committed"
            consistency_model: "cursor-stability"
            time_limit: 600
          - name: "RCSI"
            backend_db: "postgres"
            workload: "elle-append elle-write-read"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "snapshot"
            jdbc_isolation_level: "read-committed"
            consistency_model: "cursor-stability"
            time_limit: 600
          - name: "RCSI_2PC"
            backend_db: "postgres"
            workload: "elle-append-2pc elle-write-read-2pc"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "snapshot"
            jdbc_isolation_level: "read-committed"
            consistency_model: "cursor-stability"
            time_limit: 600
          - name: "Serializable"
            backend_db: "postgres"
            workload: "elle-append elle-write-read"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "serializable"
            jdbc_isolation_level: "read-committed"
            consistency_model: "strict-serializable"
            time_limit: 600
          - name: "Serializable_2PC"
            backend_db: "postgres"
            workload: "elle-append-2pc elle-write-read-2pc"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "serializable"
            jdbc_isolation_level: "read-committed"
            consistency_model: "strict-serializable"
            time_limit: 600
          - name: "OnePhaseCommit_SI"
            backend_db: "postgres"
            workload: "elle-append elle-write-read"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: true
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "snapshot"
            jdbc_isolation_level: "read-committed"
            consistency_model: "cursor-stability"
            time_limit: 600
          - name: "OnePhaseCommit_Serializable"
            backend_db: "postgres"
            workload: "elle-append elle-write-read"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: true
            enable_group_commit: false
            enable_client_side_optimizations: false
            isolation_level: "serializable"
            jdbc_isolation_level: "read-committed"
            consistency_model: "strict-serializable"
            time_limit: 600
          - name: "GroupCommit"
            backend_db: "postgres"
            workload: "elle-append elle-write-read"
            nemesis: "none partition packet clock crash"
            enable_one_phase_commit: false
            enable_group_commit: true
            enable_client_side_optimizations: false
            isolation_level: "serializable"
            jdbc_isolation_level: "read-committed"
            consistency_model: "strict-serializable"
            time_limit: 600
