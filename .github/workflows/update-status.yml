name: Update status page

on:
  workflow_run:
    workflows:
      - "Daily ScalarDB test"
      - "Daily ScalarDL test"
      - "Daily ScalarDB Cluster test"
    types:
      - completed

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Determine suite
        id: suite
        run: |
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          case "$WORKFLOW_NAME" in
            "Daily ScalarDB test")
              echo "suite=scalardb" >> $GITHUB_OUTPUT
              echo "job_prefix=DB-" >> $GITHUB_OUTPUT
              ;;
            "Daily ScalarDL test")
              echo "suite=scalardl" >> $GITHUB_OUTPUT
              echo "job_prefix=DL-" >> $GITHUB_OUTPUT
              ;;
            "Daily ScalarDB Cluster test")
              echo "suite=scalardb-cluster" >> $GITHUB_OUTPUT
              echo "job_prefix=ScalarDB Cluster / " >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Collect results from artifacts
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          PREFIX="${{ steps.suite.outputs.job_prefix }}"

          # Get expected test names from the job list
          gh api --paginate "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs" \
            --jq ".jobs[] | select(.name | startswith(\"${PREFIX}\")) | .name | ltrimstr(\"${PREFIX}\")" \
            > /tmp/expected_tests.txt

          # Download result artifacts
          mkdir -p /tmp/results
          gh api --paginate "repos/${{ github.repository }}/actions/runs/${RUN_ID}/artifacts" \
            --jq '.artifacts[] | select(.name | startswith("result-")) | .name' | \
            while read name; do
              gh run download "$RUN_ID" -n "$name" -D /tmp/results -R "${{ github.repository }}" || true
            done

          # Parse result files: success or failure
          echo '[]' > /tmp/results.json
          found_tests=""
          for file in /tmp/results/result-*.txt; do
            [ -f "$file" ] || continue
            while IFS=: read -r test status; do
              found_tests="${found_tests} ${test}"
              jq --arg test "$test" --arg status "$status" \
                '. += [{"test": $test, "status": $status}]' \
                /tmp/results.json > /tmp/results_tmp.json
              mv /tmp/results_tmp.json /tmp/results.json
            done < "$file"
          done

          # Tests with no result artifact = timeout
          while read -r test; do
            [ -z "$test" ] && continue
            if ! echo "$found_tests" | grep -qw "$test"; then
              jq --arg test "$test" \
                '. += [{"test": $test, "status": "timeout"}]' \
                /tmp/results.json > /tmp/results_tmp.json
              mv /tmp/results_tmp.json /tmp/results.json
            fi
          done < /tmp/expected_tests.txt

      - name: Update status.json
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          SUITE="${{ steps.suite.outputs.suite }}"
          TODAY=$(date -u +%Y-%m-%d)

          jq --arg suite "$SUITE" \
             --arg date "$TODAY" \
             --argjson run_id "$RUN_ID" \
             --arg now "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
             --slurpfile results /tmp/results.json '
            .last_updated = $now |
            .suites[$suite].tests as $current_tests |
            reduce $results[0][] as $r (
              .;
              .suites[$suite].tests[$r.test] = (
                ($current_tests[$r.test] // []) |
                [{"date": $date, "status": $r.status, "run_id": $run_id}] +
                [.[] | select(.date != $date)] |
                sort_by(.date) | reverse |
                .[0:30]
              )
            )
          ' docs/data/status.json > /tmp/status_new.json

          mv /tmp/status_new.json docs/data/status.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/status.json
          git diff --cached --quiet && exit 0
          git commit -m "Update status: ${{ steps.suite.outputs.suite }} $(date -u +%Y-%m-%d)"
          git push
